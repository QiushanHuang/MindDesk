name: Release

on:
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Create a draft GitHub Release with the packaged artifacts"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Developer ID notarized macOS package
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release ref
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' <VERSION)"
          if [[ "$GITHUB_REF_TYPE" != "tag" && "$GITHUB_REF_NAME" != "main" ]]; then
            echo "::error::Release workflow must run from main or from a pushed version tag."
            exit 1
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match VERSION v${VERSION}."
            exit 1
          fi

      - name: Set release artifact suffix
        run: |
          set -euo pipefail
          ARCH="$(printf '%s' "${RUNNER_ARCH:-unknown}" | tr '[:upper:]' '[:lower:]')"
          echo "RELEASE_PLATFORM_SUFFIX=macOS-${ARCH}" >>"$GITHUB_ENV"

      - name: Verify release inputs before signing
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' <VERSION)"
          test -f "docs/releases/v${VERSION}.md"
          swift test --scratch-path /tmp/minddesk-release-tests
          bash -n script/build_and_run.sh
          bash -n script/package_release.sh
          plutil -lint script/release.entitlements
          git diff --check

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.SIGNING_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/minddesk-signing.keychain-db"
          export CERTIFICATE_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          encoded = os.environ["CERTIFICATE_BASE64"]
          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(encoded))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          export API_KEY_PATH
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          encoded = os.environ["API_KEY_BASE64"]
          Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(encoded))
          PY
          chmod 600 "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >>"$GITHUB_ENV"

      - name: Build, sign, notarize, and staple release artifacts
        env:
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          : "${API_KEY_PATH:?Missing decoded App Store Connect API key path}"
          ./script/package_release.sh \
            --mode notarized \
            --identity "$CODESIGN_IDENTITY" \
            --team-id "$TEAM_ID" \
            --notary-key "$API_KEY_PATH" \
            --notary-key-id "$NOTARY_KEY_ID" \
            --notary-issuer "$NOTARY_ISSUER"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minddesk-macos-${{ runner.arch }}-release
          path: |
            dist/release/*/artifacts/*.zip
            dist/release/*/artifacts/*.dmg
            dist/release/*/artifacts/*.txt
            dist/release/*/artifacts/*.md
            dist/release/*/artifacts/*.json
            dist/release/*/artifacts/*.plist

      - name: Create draft GitHub Release
        if: ${{ inputs.publish_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' <VERSION)"
          ARTIFACT_DIR="dist/release/MindDesk-v${VERSION}-${RELEASE_PLATFORM_SUFFIX}/artifacts"
          gh release create "v${VERSION}" \
            "$ARTIFACT_DIR/MindDesk-v${VERSION}-${RELEASE_PLATFORM_SUFFIX}.zip" \
            "$ARTIFACT_DIR/MindDesk-v${VERSION}-${RELEASE_PLATFORM_SUFFIX}.dmg" \
            "$ARTIFACT_DIR/SHA256SUMS.txt" \
            "$ARTIFACT_DIR/INSTALL.txt" \
            "$ARTIFACT_DIR/RELEASE-NOTES.md" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "MindDesk v${VERSION}" \
            --notes-file "$ARTIFACT_DIR/RELEASE-NOTES.md"
